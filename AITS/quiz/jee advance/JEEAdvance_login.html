<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="">
    <meta name="author" content="">
    <link rel="shortcut icon" href="Quiz/img/favicon.ico">
    <title>BLUE SKY</title>
    <link href="Quiz/css/font-awesome.min.css" rel="stylesheet" />
    <link href="Quiz/css/custom.css" rel="stylesheet" />
    <link href="Quiz/css/bootstrap.min.css" rel="stylesheet" />
    <link href="Quiz/css/style.default.css" rel="stylesheet" />
    <script type="text/javascript" src="Quiz/js/angular.min.js"></script>
    <script type="text/javascript" src="Quiz/js/angular.sanitize.min.js"></script>

    <script type="text/javascript" src="project.js"></script>
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-125433287-1"></script>
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }
        gtag('js', new Date());

        gtag('config', 'UA-125433287-1');
    </script>
</head>

<body>
    <div id="all">
        <header class="main-header">
            <div class="navbar" data-spy="affix" data-offset-top="200">
                <div class="navbar navbar-default yamm" role="navigation" id="navbar">
                    <div class="container">
                        <div class="navbar-header">
                            <a class="navbar-brand home">
                                <img src="Quiz/img/logo.PNG" alt="NTA logo" class="img-responsive">
                            </a>
                        </div>
                        <div class="col-md-5 pull-right">
                            <div class="navbar-collapse">
                                <ul class="nav navbar-nav pull-right exam-paper ">
                                    <li class="user-profile">
                                        <a class="btn btn-primary btn-block btn-lg" id="redirect_register" href="">New
                                            User? Register</a>
                                        
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>
        <div class="clear"></div>
        <div id="heading-breadcrumbs">
            <div class="container">
                <div class="row">
                    <div class="col-md-12">
                        <div style="color: #FFF; padding: 0 0 10px 0;">
                            <div style="font-size: 22px;">System Name :BLUE SKY </div>
                            <div>Contact Invigilator if the Name and Photograph displayed on the screen is not yours
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="home-carousel">
                <div class="area-bg">
                    <div ng-app="test-app">
                        <div id="content" ng-cloak ng-controller="loginController">
                                
                            <form name="frmlogin" novalidate method="post">
                                <div class="container">
                                    <div class="row">
                                        <div class="col-md-4 col-md-offset-4">
                                            <div class="box-part">
                                                <h4>Login</h4>
                                                <hr>
                                                <div class="form-group">
                                                    <label>Username</label>
                                                    <input id="txtUsername" placeholder="" required name="uname"
                                                        ng-model="user.uname" type="text" class="form-control" />
                                                    <div class="text-right text-danger" style="padding-top: 5px;"
                                                        ng-show="frmlogin.$submitted || frmlogin.uname.$touched">
                                                        <small ng-show="frmlogin.uname.$error.required">Enter
                                                            Username</small>
                                                    </div>
                                                </div>
                                                <div class="form-group">
                                                    <label>Password</label>
                                                    <input id="txtPassword" placeholder="" type="password" required
                                                        name="pwd" ng-model="user.pass" class="form-control" />
                                                    <div class="text-right text-danger" style="padding-top: 5px;"
                                                        ng-show="frmlogin.$submitted || frmlogin.pwd.$touched">
                                                        <small ng-show="frmlogin.pwd.$error.required">Enter
                                                            Password</small>
                                                    </div>
                                                </div>
                                                <div ng-show="err" class="text-center text-danger">{{errmsg}}</div>
                                                <div class="form-group">
                                                    <h6 style="text-align:center; color:red;">Click Login To proceed<img
                                                            src="Quiz//img/newicon.gif" /></h6>
                                                    <button ng-click="login()" type="submit"
                                                        class="btn btn-primary btn-block btn-lg">Login</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </form>
                            
                        </div>
                    </div>
                </div>
            </div>
            <div id="copyright">
                <div class="container">
                    <div class="col-md-12">
                        <p class="text-center">&copy; BLUE SKY</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="Quiz/js/jquery.min.js" type="text/javascript"></script>
    <script src="Quiz/js/bootstrap.min.js" type="text/javascript"></script>
    <script>
        $(document).ready(function () {
            //console.log(atob(window.location.search.split("?")[1].split('=')[1]));
            $('#redirect_link').prop("href", "Quiz/Instruction_jee.html?type=" + window.location.search.split("?")[1].split('=')[1]);
            $('#redirect_register').prop("href", "Quiz/Register.html?type=" + window.location.search.split("?")[1].split('=')[1]);
        });
    </script>
</body>

</html>
